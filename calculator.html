<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator</title>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <form class="calculator border p-4 rounded shadow">

        <div class="mb-3 text-center fw-bold"><h2>CALCULATOR</h2></div>

      <div class="p-2 mb-2"><input type="number" placeholder="Enter first number" id="num1"></div>
        
      
      <div class="p-2 mb-2">
            <select class="form-select"  id="operator">
                <option value="1">+</option>
                <option value="2">-</option>
                <option value="3">*</option>
                <option value="4">/</option>
        </select>
    </div>


        <div class="p-2 mb-3"><input type="number" placeholder="Enter second number" id="num2"></div>
       
       
        <button type="button" class="btn btn-info w-100" onclick="calculate()">=</button>

        <div class="result text-center fw-bold  mt-3" id="result"></div>
    
    </form>
</div>
    <script>
        function calculate(){
       const num1=parseFloat(document.getElementById("num1").value);
       const num2=parseFloat(document.getElementById("num2").value);
       const operator=document.getElementById("operator").value;
       let result;

       if(isNaN(num1) || isNaN(num2)){
        result="Please enter valid number"
       }

       else{
        switch(operator){
            case '1':
                result=num1+num2;
                break;
            case '2':
                result=num1-num2;
                break;
            case '3':
                result=num1*num2;
                break;     
            case '4':
                if (num2 === 0)
                {
                    result="Cannot divide by zero";
                }
                else{
                result=num1/num2;
                }        
                break;
            default:
                result="invalid option"
           }
        }
        document.getElementById('result').innerText = `Result: ${result}`;
    }

    </script>
</body>
</html>
